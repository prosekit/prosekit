packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@tsdown/css": "^0.22.1"
  "@types/node": "^24.12.2"
  "@vitest/browser-playwright": "^4.1.8"
  "@vitest/coverage-v8": "^4.1.8"
  "@vitest/ui": "^4.1.8"
  tsdown: "^0.22.1"
  typescript: "~6.0.3"
  vitest: "^4.1.8"

dedupePeers: true

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  dprint: false
  esbuild: false
  sharp: false
  workerd: false

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - "@vitest/browser-playwright@4.1.8"
  - "@vitest/browser@4.1.8"
  - "@vitest/coverage-v8@4.1.8"
  - "@vitest/expect@4.1.8"
  - "@vitest/mocker@4.1.8"
  - "@vitest/pretty-format@4.1.8"
  - "@vitest/runner@4.1.8"
  - "@vitest/snapshot@4.1.8"
  - "@vitest/spy@4.1.8"
  - "@vitest/ui@4.1.8"
  - "@vitest/utils@4.1.8"
  - vitest@4.1.8
  - vite@7.3.5
  - vite@8.0.16
  - "@types/react@19.2.16"
  - react-dom@19.2.7
  - react@19.2.7
