name: hide-bot-comment

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  hide-bot-comment:
    runs-on: ubuntu-latest

    steps:
      - id: hide-comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: int128/hide-comment-action@392bc214093dafaebdf99c7d6298245262832d15 # v1.58.0
        with:
          authors: |
            github-actions
            changeset-bot
            coderabbitai
            pkg-pr-new
