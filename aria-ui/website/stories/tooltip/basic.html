<aria-ui-tooltip-root class="inline-block">
  <aria-ui-tooltip-trigger
    tabindex="0"
    open-delay="300"
    class="inline-block px-5 py-2.5 bg-blue-500 text-white border-0 rounded-md cursor-pointer text-sm font-medium transition-colors duration-200 hover:bg-blue-600"
  >
    Hover me
  </aria-ui-tooltip-trigger>
  <aria-ui-tooltip-positioner class="overflow-visible">
    <aria-ui-tooltip-popup class="block bg-gray-900 text-white rounded-md shadow-lg px-3 py-1.5 text-sm">
      This is a tooltip
    </aria-ui-tooltip-popup>
  </aria-ui-tooltip-positioner>
</aria-ui-tooltip-root>
