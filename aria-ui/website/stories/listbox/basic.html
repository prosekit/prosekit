<aria-ui-listbox-root class="block w-64 border border-gray-300 rounded-md overflow-hidden">
  <aria-ui-listbox-item
    value="apple"
    class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500"
  >
    Apple
  </aria-ui-listbox-item>
  <aria-ui-listbox-item
    value="banana"
    class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500"
  >
    Banana
  </aria-ui-listbox-item>
  <aria-ui-listbox-item
    value="cherry"
    class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500"
  >
    Cherry
  </aria-ui-listbox-item>
  <aria-ui-listbox-item value="grape" disabled class="block px-3 py-2 cursor-not-allowed text-gray-400">
    Grape (disabled)
  </aria-ui-listbox-item>
</aria-ui-listbox-root>
