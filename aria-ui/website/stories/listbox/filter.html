<div class="w-64">
  <input
    id="listbox-filter-input"
    type="text"
    placeholder="Filter items..."
    class="w-full px-3 py-2 border border-gray-300 rounded-t-md outline-none focus:border-blue-500"
  />
  <aria-ui-listbox-root id="listbox-filter-root" auto-focus class="block border border-t-0 border-gray-300 rounded-b-md overflow-hidden">
    <aria-ui-listbox-item
      value="apple"
      class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500 [&[hidden]]:hidden"
    >
      Apple
    </aria-ui-listbox-item>
    <aria-ui-listbox-item
      value="banana"
      class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500 [&[hidden]]:hidden"
    >
      Banana
    </aria-ui-listbox-item>
    <aria-ui-listbox-item
      value="cherry"
      class="block px-3 py-2 cursor-pointer hover:bg-blue-50 [&[aria-selected=true]]:bg-blue-100 [&[data-active]]:outline [&[data-active]]:outline-2 [&[data-active]]:outline-blue-500 [&[hidden]]:hidden"
    >
      Cherry
    </aria-ui-listbox-item>
    <aria-ui-listbox-empty class="block px-3 py-2 text-gray-400 italic">
      No matching items
    </aria-ui-listbox-empty>
  </aria-ui-listbox-root>
</div>

<script>
const input = document.getElementById('listbox-filter-input')
const root = document.getElementById('listbox-filter-root')
input.addEventListener('input', (e) => {
  root.query = e.target.value
})
</script>
