packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@types/node": "^24.10.13"
  "@vitest/browser-playwright": "^4.1.0"
  "@vitest/coverage-v8": "^4.1.0"
  "@vitest/ui": "^4.1.0"
  vitest: "^4.1.0"
  tsdown: "^0.21.4"
  "@tsdown/css": "^0.21.4"
  typescript: "~5.9.3"

ignoreWorkspaceRootCheck: true

ignoredBuiltDependencies:
  - "@parcel/watcher"
  - dprint
  - esbuild
  - sharp
  - workerd

minimumReleaseAge: 600 # 10 hours

minimumReleaseAgeExclude:
  - "@ocavue/*"
  - "prosemirror-*"
  - "astrobook"
  - "@astrobook/*"
  - "knip"

overrides:
  "@prosemirror-adapter/core": "https://pkg.pr.new/@prosemirror-adapter/core@228"
  "@prosemirror-adapter/react": "https://pkg.pr.new/@prosemirror-adapter/react@228"
  "@prosemirror-adapter/vue": "https://pkg.pr.new/@prosemirror-adapter/vue@228"
  "@prosemirror-adapter/solid": "https://pkg.pr.new/@prosemirror-adapter/solid@228"
  "@prosemirror-adapter/svelte": "https://pkg.pr.new/@prosemirror-adapter/svelte@228"
  "@prosemirror-adapter/preact": "https://pkg.pr.new/@prosemirror-adapter/preact@228"

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days
