# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 30
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 30
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore"
