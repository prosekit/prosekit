packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@tsdown/css": "^0.22.0"
  "@types/node": "^25.6.2"
  "@vitest/browser-playwright": "^4.1.5"
  "@vitest/coverage-v8": "^4.1.5"
  "@vitest/ui": "^4.1.5"
  tsdown: "^0.22.0"
  typescript: "~6.0.3"
  vitest: "^4.1.5"

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  dprint: false
  esbuild: false
  sharp: false
  workerd: false

overrides: {}

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

# TODO: remove this after the following issues are resolved:
# https://github.com/sveltejs/language-tools/pull/2985
# https://github.com/withastro/astro/pull/16433
peerDependencyRules:
  allowedVersions:
    typescript: "6"
