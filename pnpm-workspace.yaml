packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@types/node": "^24.10.13"
  "@vitest/browser-playwright": "^4.0.18"
  "@vitest/coverage-v8": "^4.0.18"
  "@vitest/ui": "^4.0.18"
  vitest: "^4.0.18"
  tsdown: "^0.21.0"
  "@tsdown/css": "^0.21.0"
  typescript: "~5.9.3"

ignoreWorkspaceRootCheck: true

ignoredBuiltDependencies:
  - dprint
  - esbuild
  - sharp
  - workerd

minimumReleaseAge: 600 # 10 hours

minimumReleaseAgeExclude:
  - "@ocavue/*"
  - "prosemirror-*"
  - "astro"
  - "@astrojs/*"
  - "rehype-resolve-markdown-links"

overrides: 
  "@prosemirror-adapter/core": "https://pkg.pr.new/@prosemirror-adapter/core@12a4d1c"
  "@prosemirror-adapter/react": "https://pkg.pr.new/@prosemirror-adapter/react@12a4d1c"
  "@prosemirror-adapter/vue": "https://pkg.pr.new/@prosemirror-adapter/vue@12a4d1c"
  "@prosemirror-adapter/solid": "https://pkg.pr.new/@prosemirror-adapter/solid@12a4d1c"
  "@prosemirror-adapter/svelte": "https://pkg.pr.new/@prosemirror-adapter/svelte@12a4d1c"
  "@prosemirror-adapter/preact": "https://pkg.pr.new/@prosemirror-adapter/preact@12a4d1c"

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days
