packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@tsdown/css": "^0.21.10"
  "@types/node": "^24.10.13"
  "@vitest/browser-playwright": "^4.1.5"
  "@vitest/coverage-v8": "^4.1.5"
  "@vitest/ui": "^4.1.5"
  tsdown: "^0.21.10"
  typescript: "~6.0.3"
  vitest: "^4.1.5"

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  dprint: false
  esbuild: false
  sharp: false
  workerd: false

minimumReleaseAge: 600 # 10 hours

minimumReleaseAgeExclude:
  - "@ocavue/*"
  - "prosemirror-*"
  - "astrobook"
  - "@astrobook/*"
  - "@prosemirror-adapter/*"
  - "@aria-ui/*"
  - "starlight-theme-nova"
  - "shiki-twoslash-renderer"
  - "twoslash"
  - "twoslash-protocol"
  - "vitest-browser-svelte"
  - "vite"

overrides: {}

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

# TODO: remove this after the following issues are resolved:
# https://github.com/sveltejs/language-tools/pull/2985
# https://github.com/withastro/astro/pull/16433
peerDependencyRules:
  allowedVersions:
    typescript: "6"
    vite: "8"
