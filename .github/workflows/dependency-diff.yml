name: dependency-diff

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  pack-base:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/cache

      - name: Build packages
        run: pnpm run build:package

      - name: Pack packages
        run: pnpm -r --filter='./packages/*' pack

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: base-packages
          path: "*.tgz"

  pack-source:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/cache

      - name: Build packages
        run: pnpm run build:package

      - name: Pack packages
        run: pnpm -r --filter='./packages/*' pack

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-packages
          path: "*.tgz"

  diff:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    needs: [pack-base, pack-source]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: base-packages
          path: base-packages

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-packages
          path: source-packages

      - uses: e18e/action-dependency-diff@8e9b8c1957ab066d36235a43f4c1ff1522e1bdbc # v1.6.1
        with:
          base-packages: ./base-packages/*.tgz
          source-packages: ./source-packages/*.tgz
