<aria-ui-popover-root class="block" default-open="true">
  <aria-ui-popover-trigger tabindex="0"  
    class="inline-block px-5 py-2.5 bg-blue-500 text-white border-0 rounded-md cursor-pointer text-sm font-medium transition-colors duration-200 hover:bg-blue-600 aria-disabled:opacity-50 aria-disabled:cursor-not-allowed">
    Click me to toggle the Popover
  </aria-ui-popover-trigger>
  <aria-ui-popover-positioner class="overflow-visible">
    <aria-ui-popover-popup class="block bg-white border border-gray-200 rounded-lg shadow-lg p-0 min-w-[200px]">
      <div class="p-4">
        <h3 class="m-0 mb-2 text-base font-semibold text-gray-900">
          This Popover is open by default
        </h3>
      </div>
    </aria-ui-popover-popup>
  </aria-ui-popover-positioner>
</aria-ui-popover-root>
