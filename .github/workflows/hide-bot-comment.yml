name: hide-bot-comment

on:
  pull_request:

jobs:
  hide-bot-comment:
    runs-on: ubuntu-latest

    steps:
      - id: hide-comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: int128/hide-comment-action@d38cf5901fbb26e4d5790890955713b0ec539087 # v1.57.0
        with:
          authors: |
            github-actions
            changeset-bot
            coderabbitai
            pkg-pr-new
