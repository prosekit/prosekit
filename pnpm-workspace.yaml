packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10.5.0"

catalog:
  "@tsdown/css": "^0.22.9"
  "@types/node": "^24.12.2"
  "@vitest/browser-playwright": "^4.1.10"
  "@vitest/coverage-v8": "^4.1.10"
  "@vitest/ui": "^4.1.10"
  tsdown: "^0.22.9"
  typescript: "~6.0.3"
  vitest: "^4.1.10"

dedupePeers: true

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  dprint: false
  esbuild: false
  simple-git-hooks: false
  workerd: false

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - "starlight-theme-nova"
  - "@aria-ui/*"
  - "@prosemirror-adapter/*"
  - miniflare@4.20260722.0
  - wrangler@4.114.0
