packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10.5.0"

catalog:
  "@tsdown/css": "^0.22.1"
  "@types/node": "^24.12.2"
  "@vitest/browser-playwright": "^4.1.8"
  "@vitest/coverage-v8": "^4.1.8"
  "@vitest/ui": "^4.1.8"
  tsdown: "^0.22.1"
  typescript: "~6.0.3"
  vitest: "^4.1.8"

dedupePeers: true

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  dprint: false
  esbuild: false
  sharp: false
  workerd: false

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - "starlight-theme-nova"
  - "@aria-ui/*"
  - prosemirror-flat-list@0.7.0
  - prosemirror-splittable@1.1.0

overrides:
  "@aria-ui/cli": "https://pkg.pr.new/@aria-ui/cli@4a85924"
  "@aria-ui/core": "https://pkg.pr.new/@aria-ui/core@4a85924"
  "@aria-ui/elements": "https://pkg.pr.new/@aria-ui/elements@4a85924"
  "@aria-ui/utils": "https://pkg.pr.new/@aria-ui/utils@4a85924"
