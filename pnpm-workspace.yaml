packages:
  - website
  - registry
  - packages/*

allowedDeprecatedVersions:
  glob: "10"

catalog:
  "@tsdown/css": "^0.21.9"
  "@types/node": "^24.10.13"
  "@vitest/browser-playwright": "^4.1.5"
  "@vitest/coverage-v8": "^4.1.5"
  "@vitest/ui": "^4.1.5"
  tsdown: "^0.21.9"
  typescript: "~5.9.3"
  vitest: "^4.1.5"

ignoreWorkspaceRootCheck: true

ignoredBuiltDependencies:
  - "@parcel/watcher"
  - dprint
  - esbuild
  - sharp
  - workerd

minimumReleaseAge: 600 # 10 hours

minimumReleaseAgeExclude:
  - "@ocavue/*"
  - "prosemirror-*"
  - "astrobook"
  - "@astrobook/*"
  - "@prosemirror-adapter/*"
  - "@aria-ui/*"
  - "starlight-theme-nova"
  - "shiki-twoslash-renderer"
  - "twoslash"
  - "twoslash-protocol"
  - "vitest-browser-svelte"
  - "vite"

overrides: {}

patchedDependencies:
  y-prosemirror: patches/y-prosemirror.patch

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

# TODO: remove this
peerDependencyRules:
  allowedVersions:
    typescript: "6"
    vite: "8"
