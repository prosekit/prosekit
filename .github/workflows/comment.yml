name: comment

on:
  issue_comment:
    types: [created]

jobs:
  run-command:
    if: github.event.issue.pull_request && (github.event.comment.body == '/docs' || github.event.comment.body == '/dist')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"

      - name: Get PR branch and checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          echo "PR_NUMBER: $PR_NUMBER"
          BRANCH_NAME=$(gh pr view $PR_NUMBER --json headRefName --jq '.headRefName')
          echo "BRANCH_NAME: $BRANCH_NAME"
          git fetch --all
          git checkout "$BRANCH_NAME"

      - name: Set up Git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

      - name: Set up pnpm
        run: |
          npm install -g corepack
          pnpm --version

      - name: Run the script
        run: |
          ./scripts/pr-command.sh "$SLASH_COMMAND"
        env:
          SLASH_COMMAND: ${{ github.event.comment.body }}
